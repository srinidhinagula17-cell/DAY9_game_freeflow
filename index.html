<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS DOM</title>
</head>
<body>
    <h1>CALCULATOR</h1>
    <pre>
    Enter the first number:
    <input type="number" id="num1">
    Enter the second number:
    <input type="number" id="num2">
    <button onclick="add()">ADD</button>
    <button onclick="subnumbers()">SUB</button>
    <button onclick="divnumbers()">DIV</button>
    <p id="result"></p>
    </pre>
    <script>
        function add()
        {
            var num1 =document.getElementById("num1").value;
            var num2 =document.getElementById("num2").value;
            var sum = parseInt(num1)+parseInt(num2);
            document.getElementById("result").innerHTML="The sum is:"+sum;
        }
        function subnumbers()
        {
            var num1 =document.getElementById("num1").value;
            var num2 =document.getElementById("num2").value;
            var sub = parseInt(num1)-parseInt(num2);
            document.getElementById("result").innerHTML="The sub is:"+sub;
        }
        function divnumbers()
        {
            var num1 =document.getElementById("num1").value;
            var num2 =document.getElementById("num2").value;
            var div = parseInt(num1)/parseint(num2);
            document.getElementById("result").innerHTML="The div is:"+div;
        }
    </script>
</body>
</html>
